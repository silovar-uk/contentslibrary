name: Apply v08 owned-unread patch

on:
  push:
    branches: [agent/v08-owned-unread-import]
    paths:
      - scripts/apply-v08-owned-unread.mjs
      - .github/workflows/apply-v08-owned-unread.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/v08-owned-unread-import
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply patch
        run: node scripts/apply-v08-owned-unread.mjs
      - name: Commit patched files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/routes/works.ts public/app.js public/index.html public/app-v02.js package.json scripts/decrypt-library-import.mjs
          if git diff --cached --quiet; then
            echo "No patch changes."
            exit 0
          fi
          git commit -m "Add owned-unread status across app"
          git push origin HEAD:agent/v08-owned-unread-import
