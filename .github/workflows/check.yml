name: Check
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Run checks
        id: checks
        shell: bash
        run: |
          set +e
          npm run check > check.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 160 check.log
          exit 0
      - name: Upload check log
        if: steps.checks.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: check-log
          path: check.log
          retention-days: 3
      - name: Stop after failed checks
        if: steps.checks.outputs.status != '0'
        run: exit 1
      - run: npm run db:migrate:local
      - run: npm run dry-run
