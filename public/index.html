<!doctype html>
<html lang="ja" class="ui-booting">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f3eee5">
  <title>作品体験ログ</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/v02.css">
  <link rel="stylesheet" href="/v05.css">
  <link rel="stylesheet" href="/v05-polish.css">
  <link rel="stylesheet" href="/v07.css">
  <link rel="stylesheet" href="/v09.css">
  <link rel="stylesheet" href="/v10.css">
  <link rel="stylesheet" href="/v13-work-tools.css">
  <link rel="stylesheet" href="/v14-editorial.css">
  <link rel="stylesheet" href="/v15-genre-shelf.css">
  <link rel="stylesheet" href="/v17-product-ui.css">
  <link rel="stylesheet" href="/v20-import-control.css">
  <style>
    html.ui-booting body{overflow:hidden}
    html.ui-booting #app,html.ui-booting dialog,html.ui-booting .toast-region{opacity:0!important;pointer-events:none!important}
    html.ui-booting body::before{content:"作品体験ログ";position:fixed;inset:0;z-index:99998;display:grid;place-items:center;background:#f3eee5;color:#20231f;font:800 18px/1.2 Inter,"Hiragino Sans","Yu Gothic UI","Yu Gothic",Meiryo,system-ui,sans-serif;letter-spacing:.04em}
    html.ui-booting body::after{content:"";position:fixed;z-index:99999;left:50%;top:calc(50% + 31px);width:76px;height:3px;border-radius:999px;background:linear-gradient(90deg,transparent,#9e3f2f,transparent);transform:translateX(-50%);animation:sakuhinBootPulse .85s ease-in-out infinite}
    #app{transition:opacity .14s ease}
    @keyframes sakuhinBootPulse{0%,100%{opacity:.24;transform:translateX(-50%) scaleX(.55)}50%{opacity:1;transform:translateX(-50%) scaleX(1)}}
    @media(prefers-reduced-motion:reduce){html.ui-booting body::after{animation:none;opacity:.75}#app{transition:none}}
  </style>
  <script>window.__sakuhinLogBootTimer=window.setTimeout(function(){document.documentElement.classList.remove('ui-booting')},3000)</script>
  <script type="module" src="/app.js"></script>
</head>
<body>
  <a class="skip-link" href="#main">本文へ移動</a>
  <div id="app" class="app-shell" data-view="home">
    <header class="topbar">
      <button class="brand" type="button" data-action="go-home" aria-label="ホームへ">
        <span class="brand-mark" aria-hidden="true">栞</span>
        <span><strong>作品体験ログ</strong><small>作品ではなく、作品との関係を記録する。</small></span>
      </button>
      <label class="global-search">
        <span class="sr-only">作品を検索</span>
        <span aria-hidden="true">⌕</span>
        <input id="globalSearch" type="search" placeholder="タイトル、作者、タグ、メモを検索" autocomplete="off">
        <kbd>⌘K</kbd>
      </label>
      <div class="top-actions">
        <button class="ghost-button" type="button" data-action="open-admin" id="adminButton" hidden>管理</button>
        <button class="primary-button compact" type="button" data-action="open-work-dialog">＋ 追加</button>
        <button class="avatar-button" type="button" data-action="open-settings" aria-label="設定"><span id="avatarInitial">U</span></button>
      </div>
    </header>

    <section id="homeView" class="home-view" aria-labelledby="homeTitle">
      <div class="hero-row">
        <div>
          <p class="eyebrow">YOUR CULTURE ARCHIVE</p>
          <h1 id="homeTitle">いま触れている作品と、<br>あとで戻りたい言葉。</h1>
          <p>読書を中心に、映画・漫画・アニメまで。同じ箱で静かに残す。</p>
        </div>
        <button class="quick-card" type="button" data-action="open-work-dialog">
          <span>最短30秒</span>
          <strong>作品を追加する</strong>
          <small>タイトル・種別・状態だけでも保存可能</small>
        </button>
      </div>
      <div id="securityBanner" class="security-banner" hidden></div>
      <div class="section-heading">
        <div><span class="section-number">01</span><h2>現在読んでいる本</h2></div>
        <button type="button" class="text-button" data-action="show-reading">すべて見る →</button>
      </div>
      <div id="readingStrip" class="reading-strip skeleton-zone" aria-live="polite"></div>

      <div class="home-columns">
        <section>
          <div class="section-heading compact-heading"><div><span class="section-number">02</span><h2>最近の読書メモ</h2></div></div>
          <div id="recentNotes" class="note-stack skeleton-zone"></div>
        </section>
        <section>
          <div class="section-heading compact-heading"><div><span class="section-number">03</span><h2>最近の作品</h2></div></div>
          <div id="recentOther" class="compact-list skeleton-zone"></div>
        </section>
      </div>
      <div id="statsBar" class="stats-bar"></div>
    </section>

    <main id="main" class="library-view" tabindex="-1">
      <aside class="filter-panel" aria-label="絞り込み">
        <div class="panel-heading"><h2>探す</h2><button class="icon-button" type="button" data-action="clear-filters" aria-label="絞り込みを解除">↺</button></div>
        <label class="field-label">作品種別
          <select id="filterType">
            <option value="">すべて</option><option value="book">本</option><option value="manga">漫画</option><option value="movie">映画</option><option value="anime">アニメ</option><option value="drama">ドラマ</option><option value="other">その他</option>
          </select>
        </label>
        <label class="field-label">状態
          <select id="filterStatus">
            <option value="">すべて</option><option value="want">読みたい・見たい</option><option value="owned_unread">所持・未読</option><option value="active">進行中</option><option value="completed">完了</option><option value="paused">一時停止</option><option value="dropped">中断</option>
          </select>
        </label>
        <label class="field-label">評価
          <select id="filterRating">
            <option value="">指定なし</option><option value="4">4.0以上</option><option value="3">3.0以上</option><option value="2">2.0以上</option>
          </select>
        </label>
        <label class="field-label">ジャンル・テーマ・タグ
          <input id="filterLabel" type="text" placeholder="例：組織">
        </label>
        <label class="check-row"><input id="filterNotes" type="checkbox"> メモがある作品のみ</label>
        <hr>
        <h3>保存ビュー</h3>
        <div class="saved-views">
          <button type="button" data-preset="reading">読書中</button>
          <button type="button" data-preset="completed">完了した作品</button>
          <button type="button" data-preset="stopped">途中で止まっている</button>
          <button type="button" data-preset="high-rating">評価4以上</button>
        </div>
      </aside>

      <section class="list-panel" aria-labelledby="libraryTitle">
        <div class="panel-heading list-heading">
          <div><p class="eyebrow">LIBRARY</p><h1 id="libraryTitle">作品一覧</h1><p id="resultSummary">読み込み中</p></div>
        </div>
        <div id="activeFilters" class="active-filters" hidden></div>
        <div id="workList" class="work-list skeleton-zone"></div>
        <button id="loadMore" class="ghost-button load-more" type="button" hidden>さらに読み込む</button>
      </section>
    </main>
  </div>

  <dialog id="workDialog" class="work-dialog">
    <form method="dialog" id="workForm">
      <div class="dialog-header"><div><p class="eyebrow">NEW EXPERIENCE</p><h2 id="workDialogTitle">作品を追加</h2></div><button class="icon-button" value="cancel" aria-label="閉じる">×</button></div>
      <input type="hidden" id="workId">
      <label>タイトル<input id="workTitle" required maxlength="300"></label>
      <label>作者・監督<input id="workCreator" maxlength="300"></label>
      <div class="form-grid"><label>種別<select id="workType"><option value="book">本</option><option value="manga">漫画</option><option value="movie">映画</option><option value="anime">アニメ</option><option value="drama">ドラマ</option><option value="other">その他</option></select></label><label>状態<select id="workStatus"><option value="want">読みたい・見たい</option><option value="owned_unread">所持・未読</option><option value="active">進行中</option><option value="completed">完了</option><option value="paused">一時停止</option><option value="dropped">中断</option></select></label></div>
      <label>評価<select id="workRating"><option value="">未評価</option><option value="5">5.0</option><option value="4.5">4.5</option><option value="4">4.0</option><option value="3.5">3.5</option><option value="3">3.0</option><option value="2.5">2.5</option><option value="2">2.0</option><option value="1.5">1.5</option><option value="1">1.0</option><option value="0.5">0.5</option></select></label>
      <label>一言メモ<textarea id="workShortNote" maxlength="280"></textarea></label>
      <div class="form-actions"><button class="ghost-button" value="cancel">キャンセル</button><button class="primary-button" value="default" id="saveWork">保存</button></div>
    </form>
  </dialog>
  <div id="toastRegion" class="toast-region" aria-live="polite"></div>
</body>
</html>
